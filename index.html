<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Status Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #fff; }
        .status-grid { display: grid; gap: 15px; }
        .service-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #333;
        }
        .service-card.up { border-left-color: #4caf50; }
        .service-card.down { border-left-color: #f44336; }
        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .service-name { font-size: 1.2em; font-weight: 600; }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }
        .status-badge.up { background: #4caf50; color: #fff; }
        .status-badge.down { background: #f44336; color: #fff; }
        .service-meta {
            color: #888;
            font-size: 0.9em;
            margin-top: 8px;
        }
        .error-logs {
            margin-top: 15px;
            padding: 15px;
            background: #0d0d15;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.8em;
            color: #ff6b6b;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            display: none;
        }
        .error-logs.show { display: block; }
        .toggle-logs {
            margin-top: 10px;
            padding: 8px 16px;
            background: #333;
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 0.85em;
        }
        .toggle-logs:hover { background: #444; }
        .last-check {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-size: 0.9em;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .uptime-chart {
            display: flex;
            gap: 2px;
            margin-top: 10px;
            height: 30px;
            align-items: flex-end;
        }
        .uptime-bar {
            flex: 1;
            min-width: 3px;
            border-radius: 2px;
        }
        .uptime-bar.up { background: #4caf50; }
        .uptime-bar.down { background: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Service Status Dashboard</h1>
        <div id="status-container" class="status-grid">
            <div class="loading">Loading status...</div>
        </div>
        <div id="last-check" class="last-check"></div>
    </div>

    <script>
        // Auto-detect backend URL
        const BACKEND_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3456' 
            : '';
        
        const STATUS_CONTAINER = document.getElementById('status-container');
        const LAST_CHECK = document.getElementById('last-check');
        
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                renderStatus(data);
            } catch (error) {
                STATUS_CONTAINER.innerHTML = `<div class="loading">Error loading status: ${error.message}</div>`;
            }
        }
        
        function renderStatus(data) {
            if (!data.services || data.services.length === 0) {
                STATUS_CONTAINER.innerHTML = '<div class="loading">No services configured</div>';
                return;
            }
            
            // Group history by service
            const historyByService = {};
            data.history.forEach(entry => {
                if (!historyByService[entry.service]) {
                    historyByService[entry.service] = [];
                }
                historyByService[entry.service].push(entry);
            });
            
            // Get latest status for each service
            const latestStatus = {};
            data.history.forEach(entry => {
                latestStatus[entry.service] = entry;
            });
            
            STATUS_CONTAINER.innerHTML = data.services.map(service => {
                const status = latestStatus[service.name];
                const serviceHistory = historyByService[service.name] || [];
                
                if (!status) {
                    return `<div class="service-card">
                        <div class="service-header">
                            <span class="service-name">${service.name}</span>
                            <span class="status-badge">Unknown</span>
                        </div>
                        <div class="service-meta">No data yet...</div>
                    </div>`;
                }
                
                const isUp = status.status === 'up';
                const chartBars = serviceHistory.slice(-30).map(h => 
                    `<div class="uptime-bar ${h.status}" title="${h.timestamp}"></div>`
                ).join('');
                
                return `
                    <div class="service-card ${status.status}">
                        <div class="service-header">
                            <span class="service-name">${service.name}</span>
                            <span class="status-badge ${status.status}">${isUp ? '✓ UP' : '✗ DOWN'}</span>
                        </div>
                        <div class="service-meta">
                            Response: ${status.responseTime}ms | 
                            ${status.statusCode ? `HTTP ${status.statusCode} | ` : ''}
                            Checked: ${new Date(status.timestamp).toLocaleTimeString()}
                        </div>
                        <div class="uptime-chart">${chartBars}</div>
                        ${!isUp ? `
                            <button class="toggle-logs" onclick="toggleLogs('${service.name}')">Show Error Logs</button>
                            <div id="logs-${service.name}" class="error-logs"></div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            if (data.lastCheck) {
                LAST_CHECK.textContent = `Last backend check: ${new Date(data.lastCheck).toLocaleString()}`;
            }
        }
        
        async function toggleLogs(serviceName) {
            const logsDiv = document.getElementById(`logs-${serviceName}`);
            if (!logsDiv) return;
            
            if (logsDiv.classList.contains('show')) {
                logsDiv.classList.remove('show');
                event.target.textContent = 'Show Error Logs';
            } else {
                logsDiv.classList.add('show');
                event.target.textContent = 'Hide Error Logs';
                
                try {
                    const response = await fetch(`/api/logs/${serviceName}`);
                    const data = await response.json();
                    logsDiv.textContent = data.logs || 'No logs available';
                } catch (error) {
                    logsDiv.textContent = `Failed to fetch logs: ${error.message}`;
                }
            }
        }
        
        // Initial load
        fetchStatus();
        
        // Refresh every 30 seconds
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
