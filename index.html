<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            border: 1px solid #2a2a4a;
        }
        
        h1 {
            color: #7289da;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .status-badge.online {
            background: rgba(78, 204, 163, 0.2);
            color: #4ecca3;
        }
        
        .status-badge.offline {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a4a;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            border-color: #7289da;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.online {
            background: #4ecca3;
            box-shadow: 0 0 10px #4ecca3;
        }
        
        .status-dot.offline {
            background: #e94560;
            box-shadow: 0 0 10px #e94560;
            animation: none;
        }
        
        .status-dot.pending {
            background: #ffd700;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #2a2a4a;
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            color: #888;
            font-size: 0.85rem;
        }
        
        .metric-value {
            font-family: monospace;
            font-size: 0.9rem;
            color: #fff;
        }
        
        .metric-value.good {
            color: #4ecca3;
        }
        
        .metric-value.warning {
            color: #ffd700;
        }
        
        .metric-value.bad {
            color: #e94560;
        }
        
        .network-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .ping-chart {
            height: 100px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            margin-top: 15px;
            padding: 10px;
            background: #0f0f1a;
            border-radius: 8px;
        }
        
        .ping-bar {
            flex: 1;
            background: #4ecca3;
            border-radius: 2px 2px 0 0;
            min-height: 2px;
            transition: height 0.3s;
        }
        
        .ping-bar.high {
            background: #ffd700;
        }
        
        .ping-bar.critical {
            background: #e94560;
        }
        
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 15, 26, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .auth-box {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #2a2a4a;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        
        .auth-box h2 {
            color: #7289da;
            margin-bottom: 20px;
        }
        
        .auth-box p {
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .auth-box input {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        
        .auth-box input:focus {
            outline: none;
            border-color: #7289da;
        }
        
        .auth-box button {
            width: 100%;
            padding: 12px 24px;
            background: #7289da;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .auth-box button:hover {
            background: #5b73c7;
        }
        
        .error-message {
            color: #e94560;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        
        .hidden {
            display: none !important;
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #7289da;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(114, 137, 218, 0.3);
            transition: transform 0.2s;
        }
        
        .refresh-btn:hover {
            transform: scale(1.1);
        }
        
        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.8rem;
        }
        
        .last-updated {
            color: #888;
        }
    </style>
</head>
<body>
    <!-- Auth Overlay -->
    <div id="authOverlay" class="auth-overlay">
        <div class="auth-box">
            <h2>🔒 Status Dashboard</h2>
            <p id="authMessage">Enter access token to view dashboard</p>
            <input type="password" id="tokenInput" placeholder="Enter token...">
            <button onclick="authenticate()">Access Dashboard</button>
            <div id="authError" class="error-message hidden"></div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>📊 System Status</h1>
            <div class="subtitle">Real-time service monitoring</div>
            <div id="connectionBadge" class="status-badge online">Connected</div>
        </header>

        <div class="grid">
            <!-- Network Status Card -->
            <div class="card network-card">
                <div class="card-header">
                    <span class="card-title">🌐 Network Status</span>
                    <div id="networkStatus" class="status-dot online"></div>
                </div>
                <div class="metric">
                    <span class="metric-label">Current Ping</span>
                    <span id="currentPing" class="metric-value good">-- ms</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Average Ping (1 min)</span>
                    <span id="avgPing" class="metric-value">-- ms</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Packet Loss</span>
                    <span id="packetLoss" class="metric-value good">0%</span>
                </div>
                <div class="ping-chart" id="pingChart">
                    <!-- Ping bars will be inserted here -->
                </div>
            </div>

            <!-- Service Cards will be inserted here -->
            <div id="servicesGrid"></div>
        </div>

        <footer>
            <div class="last-updated">Last updated: <span id="lastUpdated">--</span></div>
            <div>Auto-refresh every 60 seconds</div>
        </footer>
    </div>

    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()" title="Refresh now">🔄</button>

    <!-- Load config first -->
    <script src="config.js"></script>
    <script>
        // Fallback config if config.js is not loaded
        if (typeof CONFIG === 'undefined') {
            var CONFIG = {
                SERVICES: [],
                REMOTE_ACCESS_TOKEN: 'demo',
                LOCAL_NETWORK_RANGES: ['192.168.', '10.', '127.', '::1'],
                PING_INTERVAL: 60000
            };
        }

        // State
        let pingHistory = [];
        let isAuthenticated = false;
        let autoRefreshInterval = null;

        // Check if running on local network
        function isLocalNetwork() {
            const hostname = window.location.hostname;
            return CONFIG.LOCAL_NETWORK_RANGES.some(range => 
                hostname.startsWith(range) || hostname === 'localhost'
            );
        }

        // Check authentication
        function checkAuth() {
            // If local network, auto-authenticate
            if (isLocalNetwork()) {
                isAuthenticated = true;
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('authMessage').textContent = 
                    'Local network detected - full access granted';
                initDashboard();
                return;
            }

            // Check for saved token
            const savedToken = localStorage.getItem('status_dashboard_token');
            if (savedToken && savedToken === CONFIG.REMOTE_ACCESS_TOKEN) {
                isAuthenticated = true;
                document.getElementById('authOverlay').classList.add('hidden');
                initDashboard();
            }
        }

        // Authenticate user
        function authenticate() {
            const token = document.getElementById('tokenInput').value.trim();
            const errorDiv = document.getElementById('authError');

            if (token === CONFIG.REMOTE_ACCESS_TOKEN) {
                localStorage.setItem('status_dashboard_token', token);
                isAuthenticated = true;
                document.getElementById('authOverlay').classList.add('hidden');
                errorDiv.classList.add('hidden');
                initDashboard();
            } else {
                errorDiv.textContent = 'Invalid token. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        }

        // Initialize dashboard
        function initDashboard() {
            createServiceCards();
            checkAllServices();
            startAutoRefresh();
        }

        // Create service cards
        function createServiceCards() {
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = '';

            CONFIG.SERVICES.forEach((service, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `service-${index}`;
                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-title">${service.name}</span>
                        <div class="status-dot pending" id="status-${index}"></div>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Status</span>
                        <span class="metric-value" id="status-text-${index}">Checking...</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Response Time</span>
                        <span class="metric-value" id="response-${index}">-- ms</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Last Check</span>
                        <span class="metric-value" id="lastcheck-${index}">--</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">URL</span>
                        <span class="metric-value" style="font-size: 0.75rem; word-break: break-all;">${service.url}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Ping a service
        async function pingService(service) {
            const start = performance.now();
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);

                const response = await fetch(service.url, {
                    method: 'HEAD',
                    mode: 'no-cors',
                    signal: controller.signal,
                    cache: 'no-cache'
                });

                clearTimeout(timeout);
                const latency = Math.round(performance.now() - start);
                
                return {
                    online: true,
                    latency: latency,
                    timestamp: new Date()
                };
            } catch (error) {
                // Try with a different approach for APIs
                if (service.type === 'api') {
                    try {
                        const response = await fetch(service.url + '?t=' + Date.now(), {
                            method: 'GET',
                            headers: {
                                'Accept': 'application/json',
                            }
                        });
                        const latency = Math.round(performance.now() - start);
                        return {
                            online: response.ok,
                            latency: latency,
                            timestamp: new Date()
                        };
                    } catch (e) {
                        return {
                            online: false,
                            latency: null,
                            timestamp: new Date(),
                            error: error.message
                        };
                    }
                }
                
                return {
                    online: false,
                    latency: null,
                    timestamp: new Date(),
                    error: error.message
                };
            }
        }

        // Check network ping
        async function checkNetworkPing() {
            const start = performance.now();
            try {
                await fetch('https://www.google.com/favicon.ico', {
                    mode: 'no-cors',
                    cache: 'no-cache'
                });
                const latency = Math.round(performance.now() - start);
                updatePingChart(latency);
                return latency;
            } catch (e) {
                updatePingChart(null);
                return null;
            }
        }

        // Update ping chart
        function updatePingChart(ping) {
            if (ping !== null) {
                pingHistory.push(ping);
                if (pingHistory.length > 50) pingHistory.shift();
            }

            const chart = document.getElementById('pingChart');
            chart.innerHTML = '';

            pingHistory.forEach(p => {
                const bar = document.createElement('div');
                bar.className = 'ping-bar';
                if (p > 100) bar.classList.add('high');
                if (p > 300) bar.classList.add('critical');
                
                const height = Math.min((p / 300) * 100, 100);
                bar.style.height = height + '%';
                chart.appendChild(bar);
            });

            // Update metrics
            if (pingHistory.length > 0) {
                const last = pingHistory[pingHistory.length - 1];
                const avg = Math.round(pingHistory.reduce((a, b) => a + b, 0) / pingHistory.length);
                
                const currentPingEl = document.getElementById('currentPing');
                currentPingEl.textContent = last + ' ms';
                currentPingEl.className = 'metric-value ' + (last < 50 ? 'good' : last < 150 ? 'warning' : 'bad');
                
                const avgPingEl = document.getElementById('avgPing');
                avgPingEl.textContent = avg + ' ms';
                avgPingEl.className = 'metric-value ' + (avg < 50 ? 'good' : avg < 150 ? 'warning' : 'bad');
            }
        }

        // Check all services
        async function checkAllServices() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');

            // Check network first
            await checkNetworkPing();

            // Check each service
            CONFIG.SERVICES.forEach(async (service, index) => {
                const status = await pingService(service);
                updateServiceCard(index, status);
            });

            document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
            
            setTimeout(() => btn.classList.remove('spinning'), 500);
        }

        // Update service card
        function updateServiceCard(index, status) {
            const dot = document.getElementById(`status-${index}`);
            const statusText = document.getElementById(`status-text-${index}`);
            const responseEl = document.getElementById(`response-${index}`);
            const lastCheckEl = document.getElementById(`lastcheck-${index}`);

            if (status.online) {
                dot.className = 'status-dot online';
                statusText.textContent = 'Operational';
                statusText.className = 'metric-value good';
                responseEl.textContent = status.latency + ' ms';
                responseEl.className = 'metric-value good';
            } else {
                dot.className = 'status-dot offline';
                statusText.textContent = 'Offline';
                statusText.className = 'metric-value bad';
                responseEl.textContent = 'Timeout';
                responseEl.className = 'metric-value bad';
            }

            lastCheckEl.textContent = status.timestamp.toLocaleTimeString();
        }

        // Start auto-refresh
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(checkAllServices, CONFIG.PING_INTERVAL);
        }

        // Manual refresh
        function manualRefresh() {
            checkAllServices();
        }

        // Handle Enter key in auth input
        document.getElementById('tokenInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') authenticate();
        });

        // Initialize on load
        window.addEventListener('load', checkAuth);

        // Handle visibility change (pause when tab hidden)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            } else if (isAuthenticated) {
                startAutoRefresh();
                checkAllServices();
            }
        });
    </script>
</body>
</html>
